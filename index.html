<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodeLens — AI Code Explainer</title>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@400;600;700;800&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --surface2: #1c2330;
            --border: #262d3a;
            --text: #e6edf3;
            --muted: #7d8590;
            --accent: #58a6ff;
            --accent2: #3fb950;
            --accent3: #f78166;
            --font-head: 'Syne', sans-serif;
            --font-code: 'JetBrains Mono', monospace
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-code);
            min-height: 100vh;
            overflow-x: hidden
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: linear-gradient(rgba(88, 166, 255, 0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(88, 166, 255, 0.02) 1px, transparent 1px);
            background-size: 32px 32px;
            pointer-events: none;
            z-index: 0
        }

        .glow1 {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(88, 166, 255, 0.05) 0%, transparent 70%);
            top: -250px;
            right: -150px;
            pointer-events: none;
            z-index: 0
        }

        .glow2 {
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(63, 185, 80, 0.04) 0%, transparent 70%);
            bottom: -200px;
            left: -100px;
            pointer-events: none;
            z-index: 0
        }

        .wrapper {
            position: relative;
            z-index: 1;
            max-width: 960px;
            margin: 0 auto;
            padding: 48px 24px 80px
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 40px;
            flex-wrap: wrap;
            gap: 16px
        }

        .logo {
            font-family: var(--font-head);
            font-size: 2.6rem;
            font-weight: 800;
            letter-spacing: -1.5px;
            line-height: 1
        }

        .logo span {
            color: var(--accent)
        }

        .logo-sub {
            font-family: var(--font-code);
            font-size: 0.6rem;
            color: var(--muted);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 6px
        }

        .badge {
            display: flex;
            gap: 6px;
            align-items: center;
            background: rgba(88, 166, 255, 0.08);
            border: 1px solid rgba(88, 166, 255, 0.2);
            color: var(--accent);
            font-size: 0.62rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 7px 14px;
            border-radius: 6px
        }

        .badge::before {
            content: '●';
            animation: pulse 2s infinite;
            font-size: 0.45rem
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0.2
            }
        }

        .api-bar {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px 20px;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 24px
        }

        .api-label {
            font-size: 0.6rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted);
            white-space: nowrap
        }

        .api-input {
            flex: 1;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 9px 14px;
            font-family: var(--font-code);
            font-size: 0.82rem;
            color: var(--text);
            outline: none;
            min-width: 160px;
            transition: border-color 0.2s
        }

        .api-input:focus {
            border-color: var(--accent)
        }

        .api-input::placeholder {
            color: var(--muted)
        }

        .save-btn {
            background: rgba(88, 166, 255, 0.1);
            border: 1px solid rgba(88, 166, 255, 0.3);
            color: var(--accent);
            font-family: var(--font-code);
            font-size: 0.75rem;
            padding: 9px 18px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap
        }

        .save-btn:hover {
            background: rgba(88, 166, 255, 0.2)
        }

        .key-status {
            font-size: 0.65rem;
            color: var(--muted);
            width: 100%
        }

        .key-status.ok {
            color: var(--accent2)
        }

        .key-status.err {
            color: var(--accent3)
        }

        .error-msg {
            background: rgba(247, 129, 102, 0.08);
            border: 1px solid rgba(247, 129, 102, 0.25);
            color: var(--accent3);
            padding: 12px 18px;
            border-radius: 8px;
            font-size: 0.82rem;
            margin-bottom: 16px;
            display: none
        }

        .input-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 20px
        }

        .card-header {
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--surface2)
        }

        .card-title {
            font-size: 0.6rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--muted)
        }

        .dots {
            display: flex;
            gap: 5px
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%
        }

        .dot-r {
            background: #ff5f57
        }

        .dot-y {
            background: #febc2e
        }

        .dot-g {
            background: #28c840
        }

        .toolbar {
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap
        }

        .tb-label {
            font-size: 0.6rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted)
        }

        select {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 5px;
            padding: 7px 10px;
            font-family: var(--font-code);
            font-size: 0.78rem;
            color: var(--text);
            outline: none;
            cursor: pointer
        }

        select:focus {
            border-color: var(--accent)
        }

        .mode-row {
            padding: 10px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 6px;
            flex-wrap: wrap
        }

        .mode-pill {
            padding: 5px 12px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--muted);
            font-family: var(--font-code);
            font-size: 0.63rem;
            cursor: pointer;
            transition: all 0.15s
        }

        .mode-pill:hover {
            border-color: var(--accent);
            color: var(--accent)
        }

        .mode-pill.active {
            background: rgba(88, 166, 255, 0.12);
            border-color: var(--accent);
            color: var(--accent)
        }

        .code-input {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text);
            font-family: var(--font-code);
            font-size: 0.85rem;
            line-height: 1.75;
            padding: 20px;
            resize: vertical;
            min-height: 260px;
            outline: none;
            tab-size: 2
        }

        .code-input::placeholder {
            color: var(--muted)
        }

        .explain-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--accent), #1f6feb);
            color: white;
            border: none;
            font-family: var(--font-head);
            font-size: 0.98rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: opacity 0.2s
        }

        .explain-btn:hover {
            opacity: 0.88
        }

        .explain-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed
        }

        .spinner {
            display: none;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        .output-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            display: none
        }

        .output-panel.show {
            display: block;
            animation: fadeUp 0.35s ease
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(12px)
            }

            to {
                opacity: 1;
                transform: none
            }
        }

        .output-header {
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--surface2)
        }

        .output-title {
            font-size: 0.6rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--accent)
        }

        .copy-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            font-family: var(--font-code);
            font-size: 0.65rem;
            padding: 5px 12px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s
        }

        .copy-btn:hover {
            border-color: var(--accent);
            color: var(--accent)
        }

        .output-body {
            padding: 24px;
            font-size: 0.88rem;
            line-height: 1.85;
            white-space: pre-wrap;
            min-height: 80px
        }

        .output-body.streaming::after {
            content: '▋';
            color: var(--accent);
            animation: blink 0.7s step-end infinite
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0
            }
        }

        .tag-row {
            padding: 10px 20px 16px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            border-top: 1px solid var(--border)
        }

        .tag-chip {
            background: rgba(88, 166, 255, 0.08);
            border: 1px solid rgba(88, 166, 255, 0.2);
            color: var(--accent);
            font-size: 0.6rem;
            letter-spacing: 1px;
            padding: 4px 10px;
            border-radius: 20px
        }

        footer {
            text-align: center;
            margin-top: 48px;
            font-size: 0.62rem;
            color: var(--muted);
            letter-spacing: 1px
        }

        footer span {
            color: var(--accent)
        }

        @media(max-width:600px) {
            .wrapper {
                padding: 24px 14px 60px
            }

            .logo {
                font-size: 2rem
            }

            .api-input {
                min-width: 0;
                width: 100%
            }

            .save-btn {
                width: 100%
            }

            .code-input {
                min-height: 180px;
                font-size: 0.8rem
            }
        }
    </style>
</head>

<body>
    <div class="glow1"></div>
    <div class="glow2"></div>
    <div class="wrapper">
        <header>
            <div>
                <div class="logo">Code<span>Lens</span></div>
                <div class="logo-sub">AI Code Explainer</div>
            </div>
            <div class="badge">Groq · LLaMA 3.3</div>
        </header>

        <div class="api-bar">
            <span class="api-label">API Key</span>
            <input type="password" class="api-input" id="apiKey" placeholder="gsk_..." autocomplete="off" />
            <button class="save-btn" onclick="saveKey()">Save Key</button>
            <div class="key-status" id="keyStatus">Enter your free Groq API key (console.groq.com)</div>
        </div>

        <div class="error-msg" id="errorMsg"></div>

        <div class="input-card">
            <div class="card-header">
                <div class="dots">
                    <div class="dot dot-r"></div>
                    <div class="dot dot-y"></div>
                    <div class="dot dot-g"></div>
                </div>
                <span class="card-title">Paste Your Code</span>
                <span></span>
            </div>
            <div class="toolbar">
                <span class="tb-label">Language</span>
                <select id="language">
                    <option value="auto">Auto Detect</option>
                    <option value="python">Python</option>
                    <option value="javascript">JavaScript</option>
                    <option value="java">Java</option>
                    <option value="c">C</option>
                    <option value="cpp">C++</option>
                    <option value="html">HTML/CSS</option>
                    <option value="sql">SQL</option>
                    <option value="bash">Bash/Shell</option>
                </select>
            </div>
            <div class="mode-row">
                <button class="mode-pill active" data-mode="explain" onclick="selectMode(this)">🔍 Explain</button>
                <button class="mode-pill" data-mode="simplify" onclick="selectMode(this)">🧒 ELI5</button>
                <button class="mode-pill" data-mode="bugs" onclick="selectMode(this)">🐛 Find Bugs</button>
                <button class="mode-pill" data-mode="optimize" onclick="selectMode(this)">⚡ Optimize</button>
                <button class="mode-pill" data-mode="comments" onclick="selectMode(this)">📝 Add Comments</button>
            </div>
            <textarea class="code-input" id="codeInput"
                placeholder="// Paste any code here...&#10;&#10;// Example:&#10;function fibonacci(n) {&#10;  if (n &lt;= 1) return n;&#10;  return fibonacci(n-1) + fibonacci(n-2);&#10;}"></textarea>
            <button class="explain-btn" id="explainBtn" onclick="explainCode()">
                <span id="btnText">🔍 ANALYZE CODE</span>
                <div class="spinner" id="spinner"></div>
            </button>
        </div>

        <div class="output-panel" id="outputPanel">
            <div class="output-header">
                <span class="output-title" id="outputTitle">✦ Explanation</span>
                <button class="copy-btn" onclick="copyOutput()">Copy</button>
            </div>
            <div class="output-body" id="outputBody"></div>
            <div class="tag-row" id="tagRow"></div>
        </div>

        <footer>Built by <span>Vibin I</span> · Powered by Groq API · CodeLens</footer>
    </div>

    <script>
        let apiKey = localStorage.getItem('codelens_key') || '';
        let selectedMode = 'explain';
        if (apiKey) { document.getElementById('apiKey').value = apiKey; document.getElementById('keyStatus').textContent = '✓ Key loaded'; document.getElementById('keyStatus').className = 'key-status ok'; }

        function saveKey() {
            const val = document.getElementById('apiKey').value.trim();
            if (!val.startsWith('gsk_')) { document.getElementById('keyStatus').textContent = '✗ Groq keys start with gsk_...'; document.getElementById('keyStatus').className = 'key-status err'; return; }
            apiKey = val; localStorage.setItem('codelens_key', val);
            document.getElementById('keyStatus').textContent = '✓ Key saved!'; document.getElementById('keyStatus').className = 'key-status ok';
        }

        function selectMode(btn) {
            document.querySelectorAll('.mode-pill').forEach(b => b.classList.remove('active'));
            btn.classList.add('active'); selectedMode = btn.dataset.mode;
            const labels = { explain: '🔍 ANALYZE CODE', simplify: '🧒 SIMPLIFY CODE', bugs: '🐛 FIND BUGS', optimize: '⚡ OPTIMIZE CODE', comments: '📝 ADD COMMENTS' };
            document.getElementById('btnText').textContent = labels[selectedMode];
        }

        function getPrompt(code, lang, mode) {
            const l = lang === 'auto' ? 'the detected programming language' : lang;
            const p = {
                explain: `Explain the following ${l} code clearly. Describe what it does overall, then explain each important part. Use clear simple language.\n\nCode:\n\`\`\`\n${code}\n\`\`\``,
                simplify: `Explain the following ${l} code as if explaining to a complete beginner with no programming background. Use everyday analogies, avoid jargon, make it fun.\n\nCode:\n\`\`\`\n${code}\n\`\`\``,
                bugs: `Review the following ${l} code for bugs, errors, and bad practices. List each issue and suggest a fix. If no bugs found, say so clearly.\n\nCode:\n\`\`\`\n${code}\n\`\`\``,
                optimize: `Analyze the following ${l} code for performance and quality improvements. Suggest specific optimizations with explanations. Show improved code where helpful.\n\nCode:\n\`\`\`\n${code}\n\`\`\``,
                comments: `Add clear, helpful inline comments to every important line or block in the following ${l} code. Return the full commented code.\n\nCode:\n\`\`\`\n${code}\n\`\`\``
            };
            return p[mode];
        }

        async function explainCode() {
            const code = document.getElementById('codeInput').value.trim();
            const lang = document.getElementById('language').value;
            const errorEl = document.getElementById('errorMsg');
            errorEl.style.display = 'none';
            if (!apiKey) { errorEl.textContent = '⚠ Please enter and save your Groq API key.'; errorEl.style.display = 'block'; return; }
            if (!code) { errorEl.textContent = '⚠ Please paste some code to analyze.'; errorEl.style.display = 'block'; return; }

            const btn = document.getElementById('explainBtn');
            btn.disabled = true; document.getElementById('btnText').style.display = 'none'; document.getElementById('spinner').style.display = 'block';
            const outputPanel = document.getElementById('outputPanel');
            const outputBody = document.getElementById('outputBody');
            outputPanel.classList.remove('show'); outputBody.textContent = ''; outputBody.classList.add('streaming');

            const titles = { explain: '✦ Code Explanation', simplify: '✦ Simplified (ELI5)', bugs: '✦ Bug Report', optimize: '✦ Optimization Suggestions', comments: '✦ Commented Code' };
            document.getElementById('outputTitle').textContent = titles[selectedMode];

            try {
                const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                    body: JSON.stringify({ model: 'llama-3.3-70b-versatile', messages: [{ role: 'user', content: getPrompt(code, lang, selectedMode) }], max_tokens: 1500, temperature: 0.3 })
                });
                if (!res.ok) { const e = await res.json(); throw new Error(e.error?.message || `API error ${res.status}`); }
                const data = await res.json();
                const result = data.choices[0].message.content;
                outputBody.classList.remove('streaming'); outputBody.textContent = result;
                const words = result.trim().split(/\s+/).length;
                document.getElementById('tagRow').innerHTML = `<div class="tag-chip">Mode: ${selectedMode}</div><div class="tag-chip">Lang: ${lang}</div><div class="tag-chip">${words} words</div>`;
                outputPanel.classList.add('show'); outputPanel.scrollIntoView({ behavior: 'smooth' });
            } catch (err) {
                outputBody.classList.remove('streaming'); errorEl.textContent = '✗ Error: ' + err.message; errorEl.style.display = 'block';
            } finally {
                btn.disabled = false; document.getElementById('btnText').style.display = 'block'; document.getElementById('spinner').style.display = 'none';
            }
        }

        function copyOutput() {
            navigator.clipboard.writeText(document.getElementById('outputBody').textContent).then(() => {
                const btn = document.querySelector('.copy-btn'); btn.textContent = 'Copied!'; btn.style.color = 'var(--accent2)';
                setTimeout(() => { btn.textContent = 'Copy'; btn.style.color = ''; }, 2000);
            });
        }
    </script>
</body>

</html>
